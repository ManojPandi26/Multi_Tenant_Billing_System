spring:
  application:
    name: MultiTenantBillingSystem

api:
  version: v1

  datasource:
    url: jdbc:postgresql://localhost:5432/mtbs_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        multiTenancy: SCHEMA
        multi_tenant_connection_provider: com.mtbs.Multitenancy.SchemaBasedMultiTenantConnectionProvider
        tenant_identifier_resolver: com.mtbs.Multitenancy.CurrentTenantIdentifierResolverImpl
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: MTBSScheduler
            instanceId: AUTO
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            useProperties: true
            tablePrefix: QRTZ_
            isClustered: true
            clusterCheckinInterval: 15000
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 5
            threadPriority: 5

  cache:
    type: redis

app:
  cookie:
    secure: true
  mail:
    from-address: badthug68@gmail.com
    from-name: MTBS Platform
  frontend-url: http://localhost:3000
  password-reset:
    token-ttl-minutes: 15     # How long a reset token is valid (default 15 min)
  auth:
    rate-limit:
      max-attempts: 5       # failed logins before lockout
      window-minutes: 15
  outbox:
    poll-interval-ms: 5000          # How often processor checks for new events
    batch-size: 100                 # Max events per poll cycle
    lock-duration-seconds: 30      # How long to hold lock during processing
    max-retries: 5                 # Max publish attempts before FAILED
    cleanup-cron: "0 0 3 * * ?"    # Daily at 3 AM UTC
  audit:
    enabled: true                  # Enable audit logging
    retention-days: 365           # Keep audit logs for 1 year
    cleanup-cron: "0 0 2 * * ?"    # Daily at 2 AM UTC
    async-logging: true           # Log asynchronously for performance


server:
  port: 8080

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000
  refresh-expiration: 604800000

razorpay:
  key-id: rzp_test_your_key_id_here
  key-secret: your_key_secret_here
  webhook-secret: your_webhook_secret_here
  currency: INR

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    root: INFO
    com.mtbs: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{tenantId}] [%X{userId}] %-5level %logger{36} - %msg%n"