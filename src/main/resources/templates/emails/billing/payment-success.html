<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{emails/layout/base :: layout(~{::content})}">
<body>
<th:block th:fragment="content">
    <p class="greeting">Payment confirmed ✅</p>
    <p class="text">
        Hi <strong th:text="${recipientName}">User</strong>,
        we've successfully received your payment. Thank you!
    </p>
    <table class="detail-table">
        <tr><td>Amount</td>
            <td><span th:text="${currency}">INR</span>&nbsp;<span th:text="${paymentAmount}">—</span></td></tr>
        <tr><td>Payment ID</td><td th:text="${paymentId}">—</td></tr>
        <tr><td>Method</td><td th:text="${paymentMethod}">—</td></tr>
        <tr><td>Next billing</td><td th:text="${nextBillingDate}">—</td></tr>
    </table>
    <div class="alert-box alert-success">
        Your subscription is active and all services are running normally.
    </div>
    <a th:href="${frontendUrl + '/billing/invoices'}" class="btn btn-success">
        View Invoice →
    </a>
</th:block>
</body>
</html>
