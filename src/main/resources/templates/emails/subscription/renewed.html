<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{emails/layout/base :: layout(~{::content})}">
<body>
<th:block th:fragment="content">
    <p class="greeting">Subscription renewed ✅</p>
    <p class="text">
        Hi <strong th:text="${recipientName}">User</strong>,
        your subscription has been successfully renewed!
    </p>
    <table class="detail-table">
        <tr><td>Plan</td><td th:text="${planName}">—</td></tr>
        <tr><td>Billing Cycle</td><td th:text="${billingCycle}">—</td></tr>
        <tr><td>Next Renewal</td><td th:text="${subscriptionEndsAt}">—</td></tr>
    </table>
    <div class="alert-box alert-success">
        Your subscription is active until <span th:text="${subscriptionEndsAt}">—</span>.
    </div>
    <a th:href="${frontendUrl + '/billing/invoices'}" class="btn btn-success">
        View Invoice →
    </a>
</th:block>
</body>
</html>
