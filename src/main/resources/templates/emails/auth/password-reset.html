<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{emails/layout/base :: layout(~{::content})}">
<body>
<th:block th:fragment="content">
    <p class="greeting">Reset your password</p>
    <p class="text">
        Hi <strong th:text="${recipientName}">User</strong>,
        we received a request to reset the password for your account.
        Click the button below — this link expires in <strong>15 minutes</strong>.
    </p>
    <a th:href="${resetLink}" class="btn">Reset Password →</a>
    <hr class="divider"/>
    <p class="text" style="font-size:13px; color:#6b7280;">
        If you didn't request a password reset, you can safely ignore this email.
        Your password will not change.
    </p>
</th:block>
</body>
</html>
