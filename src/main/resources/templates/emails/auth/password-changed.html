<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{emails/layout/base :: layout(~{::content})}">
<body>
<th:block th:fragment="content">
    <p class="greeting">Password changed</p>
    <p class="text">
        Hi <strong th:text="${recipientName}">User</strong>,
        your account password was successfully changed on
        <strong th:text="${eventTime}">—</strong>.
    </p>
    <table class="detail-table">
        <tr><td>IP Address</td><td th:text="${ipAddress}">—</td></tr>
        <tr><td>Device</td><td th:text="${deviceInfo}">—</td></tr>
    </table>
    <div class="alert-box alert-danger">
        🔐 If you did not make this change, contact support immediately and reset your password.
    </div>
    <a th:href="${frontendUrl + '/settings/security'}" class="btn btn-danger">
        I didn't do this
    </a>
</th:block>
</body>
</html>
