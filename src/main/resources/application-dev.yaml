spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  quartz:
    jdbc:
      initialize-schema: always
    properties:
      org:
        quartz:
          scheduler:
            instanceName: MTBSScheduler-Dev
          jobStore:
            isClustered: false
          threadPool:
            threadCount: 3

app:
  auth:
    rate-limit:
      max-attempts: 15

jwt:
  issuer: mtbs-app
  audience: mtbs-client

logging:
  level:
    com.mtbs: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [tenant:%X{tenantId}] [user:%X{userId}] [%X{method} %X{uri}] - %msg%n"
  file:
    name: logs/app.log