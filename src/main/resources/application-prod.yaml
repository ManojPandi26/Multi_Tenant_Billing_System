spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false

  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  hikari:
    maximum-pool-size: 20
    minimum-idle: 5

  quartz:
    properties:
      org:
        quartz:
          scheduler:
            instanceName: MTBSScheduler-Prod
          jobStore:
            isClustered: true
          threadPool:
            threadCount: 10

app:
  cookie:
    secure: true

logging:
  level:
    root: WARN
    com.mtbs: INFO
    org.hibernate.SQL: WARN
  file:
    name: /var/log/mtbs/app.log