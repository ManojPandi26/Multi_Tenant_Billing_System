version: '3.8'

services:
  app:
    build: .
    container_name: mtbs-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mtbs
      - SPRING_DATASOURCE_USERNAME=mtbs_user
      - SPRING_DATASOURCE_PASSWORD=mtbs_pass
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mtbs-network

  postgres:
    image: postgres:16-alpine
    container_name: mtbs-postgres
    environment:
      POSTGRES_DB: mtbs
      POSTGRES_USER: mtbs_user
      POSTGRES_PASSWORD: mtbs_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtbs_user -d mtbs"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mtbs-network

  redis:
    image: redis:7-alpine
    container_name: mtbs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mtbs-network

volumes:
  postgres-data:
  redis-data:

networks:
  mtbs-network:
    driver: bridge
